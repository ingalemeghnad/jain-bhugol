<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>संवर आणि निर्जरा — Jainverse</title>
<meta name="description" content="कर्म येणं थांबवायचं कसं आणि जुनं कर्म काढायचं कसं — संवर आणि निर्जराची ओळख.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Tiro+Devanagari+Hindi:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --saffron: #e07830;
    --saffron-deep: #c45e1a;
    --saffron-light: #f4a560;
    --indigo: #1a2744;
    --indigo-mid: #2a3d66;
    --indigo-light: #3d5a8a;
    --gold: #c9a84c;
    --gold-light: #e4cf8a;
    --sand: #f5f0e8;
    --sand-dark: #e8dfd0;
    --warm-white: #faf8f4;
    --stone: #8c7e6a;
    --stone-light: #b0a48e;
    --text: #2a2318;
    --text-secondary: #5c5246;
    --text-tertiary: #8a7e6e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html {
    scroll-behavior: smooth;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    font-family: 'Instrument Sans', 'Tiro Devanagari Hindi', sans-serif;
    color: var(--text);
    background: var(--warm-white);
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9999;
    opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px 200px;
  }

  .topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 18px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: background 0.4s, box-shadow 0.4s, padding 0.4s;
  }

  .topbar.scrolled {
    background: rgba(250, 248, 244, 0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    box-shadow: 0 1px 0 rgba(0,0,0,0.06);
    padding: 13px 40px;
  }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-secondary);
    text-decoration: none;
    transition: color 0.25s;
  }

  .back-link:hover { color: var(--saffron-deep); }
  .back-link svg { width: 16px; height: 16px; transition: transform 0.25s; }
  .back-link:hover svg { transform: translateX(-3px); }

  .lang-switch {
    display: flex;
    align-items: center;
    border: 1px solid var(--sand-dark);
    border-radius: 20px;
    overflow: hidden;
    background: rgba(245, 240, 232, 0.6);
  }

  .lang-btn {
    padding: 5px 12px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-tertiary);
    background: none;
    border: none;
    cursor: pointer;
    transition: all 0.25s;
    font-family: 'Instrument Sans', 'Tiro Devanagari Hindi', sans-serif;
    white-space: nowrap;
  }

  .lang-btn:hover { color: var(--text-secondary); }
  .lang-btn.active { background: var(--indigo); color: var(--sand); font-weight: 600; }
  .lang-divider { width: 1px; height: 16px; background: var(--sand-dark); }

  .article {
    max-width: 640px;
    margin: 0 auto;
    padding: 140px 28px 100px;
  }

  .page-header {
    margin-bottom: 72px;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 0.8s 0.2s forwards;
  }

  .page-header h1 {
    font-family: 'DM Serif Display', 'Tiro Devanagari Hindi', serif;
    font-size: clamp(36px, 5vw, 52px);
    color: var(--indigo);
    line-height: 1.15;
    letter-spacing: -0.5px;
    margin-bottom: 12px;
  }

  .page-header .subtitle {
    font-family: 'DM Serif Display', 'Tiro Devanagari Hindi', serif;
    font-style: italic;
    font-size: clamp(16px, 2vw, 20px);
    color: var(--stone);
    line-height: 1.4;
  }

  .header-rule {
    width: 48px;
    height: 2px;
    background: var(--saffron);
    margin-top: 28px;
    opacity: 0.7;
  }

  .section {
    margin-bottom: 80px;
    position: relative;
  }

  .section-num {
    font-family: 'DM Serif Display', serif;
    font-size: 80px;
    color: var(--sand-dark);
    line-height: 1;
    margin-bottom: -12px;
    user-select: none;
  }

  .section-question {
    font-family: 'DM Serif Display', 'Tiro Devanagari Hindi', serif;
    font-size: clamp(24px, 3.5vw, 32px);
    color: var(--indigo);
    line-height: 1.25;
    margin-bottom: 28px;
    letter-spacing: -0.3px;
  }

  .section-body {
    font-size: 17px;
    line-height: 2;
    color: var(--text-secondary);
  }

  .section-body .sentence { display: block; margin-bottom: 12px; }
  .section-body .emphasis { color: var(--text); font-weight: 500; }
  .section-body .term { color: var(--saffron-deep); font-weight: 500; }

  .section-divider {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin: 80px 0;
    color: var(--sand-dark);
    user-select: none;
  }

  .section-divider::before,
  .section-divider::after {
    content: '';
    height: 1px;
    width: 40px;
    background: linear-gradient(90deg, transparent, var(--sand-dark));
  }

  .section-divider::after {
    background: linear-gradient(90deg, var(--sand-dark), transparent);
  }

  .section-divider span { font-size: 14px; color: var(--stone-light); }

  .next-read {
    padding: 28px 32px;
    background: var(--sand);
    border-radius: 8px;
    text-decoration: none;
    color: inherit;
    display: block;
    transition: all 0.3s;
  }

  .next-read:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(42, 35, 24, 0.08);
  }

  .next-read-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--saffron);
    margin-bottom: 8px;
  }

  .next-read-title {
    font-family: 'DM Serif Display', 'Tiro Devanagari Hindi', serif;
    font-size: 22px;
    color: var(--indigo);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .next-read-title svg {
    width: 18px;
    height: 18px;
    color: var(--saffron);
    transition: transform 0.3s;
  }

  .next-read:hover .next-read-title svg { transform: translateX(4px); }

  .page-nav {
    display: flex;
    gap: 16px;
    margin-top: 80px;
  }

  .page-nav .next-read {
    margin-top: 0;
    flex: 1;
  }

  .prev-read {
    flex: 1;
    padding: 28px 32px;
    background: var(--sand);
    border-radius: 8px;
    text-decoration: none;
    color: inherit;
    display: block;
    transition: all 0.3s;
  }

  .prev-read:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(42, 35, 24, 0.08);
  }

  .prev-read-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--stone-light);
    margin-bottom: 8px;
  }

  .prev-read-title {
    font-family: 'DM Serif Display', 'Tiro Devanagari Hindi', serif;
    font-size: 22px;
    color: var(--indigo);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .prev-read-title svg {
    width: 18px;
    height: 18px;
    color: var(--stone-light);
    transition: transform 0.3s;
  }

  .prev-read:hover .prev-read-title svg { transform: translateX(-4px); }

  .article-footer {
    margin-top: 60px;
    padding-top: 32px;
    border-top: 1px solid var(--sand-dark);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .article-footer .brand {
    font-family: 'DM Serif Display', serif;
    font-size: 16px;
    color: var(--stone);
    text-decoration: none;
  }

  .article-footer .note { font-size: 12px; color: var(--text-tertiary); }

  .reveal {
    opacity: 0;
    transform: translateY(24px);
    transition: opacity 0.7s cubic-bezier(0.4, 0, 0.2, 1),
                transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .reveal.visible { opacity: 1; transform: translateY(0); }

  @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

  @media (max-width: 600px) {
    .topbar { padding: 14px 18px; }
    .topbar.scrolled { padding: 11px 18px; }
        .timeline-bar { top: 48px; }
    .topbar.scrolled ~ .timeline-bar { top: 42px; }
    .timeline-inner { padding: 8px 16px 6px; gap: 12px; }
    .timeline-dot { width: 20px; height: 20px; font-size: 9px; }
    .timeline-connector { width: 10px; margin-top: 9px; }
    .timeline-step-label { font-size: 8px; }
    .article { padding: 160px 20px 60px; }
    .page-header { margin-bottom: 52px; }
    .section { margin-bottom: 56px; }
    .section-num { font-size: 56px; margin-bottom: -8px; }
    .section-question { font-size: 22px; margin-bottom: 20px; }
    .section-body { font-size: 16px; line-height: 1.9; }
    .section-divider { margin: 56px 0; }
    .next-read { padding: 22px 24px; }
    .next-read-title { font-size: 19px; }
    .prev-read { padding: 22px 24px; }
    .prev-read-title { font-size: 19px; }
    .page-nav { flex-direction: column; }
    .article-footer { flex-direction: column; gap: 8px; text-align: center; }
    .lang-btn { padding: 4px 9px; font-size: 11px; }
  }
</style>
</head>
<body>

<div class="topbar" id="topbar">
  <a href="/ashrav-bandh/" class="back-link">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M13 8H3M7 4l-4 4 4 4"/>
    </svg>
    <span data-i18n="back_text"></span>
  </a>
  <div class="lang-switch">
    <button class="lang-btn" data-lang="mr">मराठी</button>
    <span class="lang-divider"></span>
    <button class="lang-btn" data-lang="hi">हिन्दी</button>
    <span class="lang-divider"></span>
    <button class="lang-btn" data-lang="en">Eng</button>
  </div>
</div>

<article class="article">

  <header class="page-header">
    <h1 data-i18n="page_title"></h1>
    <p class="subtitle" data-i18n="page_subtitle"></p>
    <div class="header-rule"></div>
  </header>

  <section class="section reveal">
    <div class="section-num">1</div>
    <h2 class="section-question" data-i18n="s1_q"></h2>
    <div class="section-body" data-i18n-html="s1_body"></div>
  </section>

  <div class="section-divider reveal"><span>◆</span></div>

  <section class="section reveal">
    <div class="section-num">2</div>
    <h2 class="section-question" data-i18n="s2_q"></h2>
    <div class="section-body" data-i18n-html="s2_body"></div>
  </section>

  <div class="section-divider reveal"><span>◆</span></div>

  <section class="section reveal">
    <div class="section-num">3</div>
    <h2 class="section-question" data-i18n="s3_q"></h2>
    <div class="section-body" data-i18n-html="s3_body"></div>
  </section>

  <div class="section-divider reveal"><span>◆</span></div>

  <section class="section reveal">
    <div class="section-num">4</div>
    <h2 class="section-question" data-i18n="s4_q"></h2>
    <div class="section-body" data-i18n-html="s4_body"></div>
  </section>

  <div class="section-divider reveal"><span>◆</span></div>

  <section class="section reveal">
    <div class="section-num">5</div>
    <h2 class="section-question" data-i18n="s5_q"></h2>
    <div class="section-body" data-i18n-html="s5_body"></div>
  </section>

  <div class="section-divider reveal"><span>◆</span></div>

  <section class="section reveal">
    <div class="section-num">6</div>
    <h2 class="section-question" data-i18n="s6_q"></h2>
    <div class="section-body" data-i18n-html="s6_body"></div>
  </section>

  <!-- Prev / Next -->
  <div class="page-nav reveal">
    <a href="/ashrav-bandh/" class="prev-read">
      <div class="prev-read-label" data-i18n="prev_label"></div>
      <div class="prev-read-title">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 8H3M7 4l-4 4 4 4"/></svg>
        <span data-i18n="prev_title"></span>
      </div>
    </a>
    <a href="/moksha/" class="next-read">
      <div class="next-read-label" data-i18n="next_label"></div>
      <div class="next-read-title">
        <span data-i18n="next_title"></span>
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8h10M9 4l4 4-4 4"/></svg>
      </div>
    </a>
  </div>

  <footer class="article-footer reveal">
    <a href="/" class="brand">Jainverse</a>
    <span class="note" data-i18n="footer_note"></span>
  </footer>

</article>

<script>
function s(sentences) {
  return sentences.map(t => '<span class="sentence">' + t + '</span>').join('');
}

const i18n = {
  mr: {
    page_title: "संवर आणि निर्जरा",
    page_subtitle: "दरवाजे बंद करणं — आणि जुनं कर्म झटकणं",
    s1_q: "दोन गोष्टी करायच्या आहेत",
    s1_body: s([
      'आतापर्यंत तुम्ही पाहिलं — कर्म कसं शिरतं (आस्रव), कसं बांधलं जातं (बंध), आणि काय करतं (आठ प्रकार).',
      'आता प्रश्न आहे — सुटका कशी?',
      'उत्तर दोन भागांत आहे:',
      '<span class="emphasis">पहिलं — नवीन कर्म शिरणं थांबवा.</span> नळ चालू असेल आणि पाणी सांडत असेल, तर आधी नळ बंद करा.',
      '<span class="emphasis">दुसरं — जे आधीच जमलंय ते काढा.</span> नळ बंद केल्यावर जमिनीवरचं पाणी पुसा.',
      'पहिल्याला <span class="term">संवर</span> म्हणतात — दरवाजे बंद करणं. दुसऱ्याला <span class="term">निर्जरा</span> — जुनं कर्म झडवणं.',
    ]),
    s2_q: "संवर — दरवाजे बंद कसे करायचे?",
    s2_body: s([
      'आस्रवाचे दरवाजे म्हणजे मन, वाणी, शरीर — आणि त्यांना चिकट बनवणाऱ्या कषाय.',
      'संवर म्हणजे हे दरवाजे बंद करणं — पण "काहीच करू नका" असं नाही. <span class="emphasis">करताना जपून करा — आतला भाव बदला.</span>',
      'संवराचे मार्ग:',
      '<span class="emphasis">सावधानी (समिती)</span> — चालताना, बोलताना, खाताना, वस्तू ठेवताना-उचलताना जपून वागणं. यांत्रिकपणे नाही — जाणीवपूर्वक.',
      '<span class="emphasis">संयम (गुप्ती)</span> — मन, वाणी, शरीराची अनावश्यक हालचाल थांबवणं. प्रत्येक विचार, प्रत्येक शब्द, प्रत्येक कृती गरजेची आहे का — हा विचार.',
      '<span class="emphasis">कषाय कमी करणं</span> — हेच मुख्य काम आहे. क्रोध, मान, माया, लोभ ओळखा, निरीक्षण करा — कषाय पेजवर तुम्ही हे पाहिलंच.',
    ]),
    s3_q: "रोजच्या जगण्यात हे कसं दिसतं?",
    s3_body: s([
      'कुणी चुकीचं बोललं — तुम्हाला राग आला. पूर्वी तुम्ही लगेच उत्तर द्यायचा. आता तुम्ही थांबता — रागाला बघता, ओळखता.',
      'हा छोटासा क्षण — हाच संवर आहे. कर्माचे कण आत यायला निघाले होते — पण तुम्ही दरवाजा बंद केला.',
      'कुणी कौतुक करतं — तुम्हाला मान वाटतो, "मीच बरोबर" असं वाटतं. तुम्ही ते ओळखता — हा पण संवर.',
      '<span class="emphasis">संवर म्हणजे जंगलात जाणं नाही — जिथे आहात तिथे जागरूक राहणं.</span>',
      'अर्थात, जो या मार्गावर खोलवर जातो — तो गृहस्थाश्रमातून मुनिधर्माकडे वळतो. पण सुरुवात जागरूकतेनेच होते.',
    ]),
    s4_q: "निर्जरा — जुनं कर्म कसं झडतं?",
    s4_body: s([
      'नवीन कर्म थांबवणं हा एक भाग. पण अनादि काळापासून जमलेलं कर्म — ते कसं निघणार?',
      'दोन प्रकारे कर्म झडतं:',
      '<span class="emphasis">आपोआप (अकाम निर्जरा)</span> — प्रत्येक कर्माला एक मुदत असते. ती संपली की ते फळ देतं आणि गळून पडतं. आजारी पडणं, सुख मिळणं, संधी हुकणं — हे सगळं जुन्या कर्माचं फळ आहे. फळ मिळालं की ते कर्म संपतं.',
      'पण आपोआप झडण्यात एक अडचण आहे — <span class="emphasis">फळ भोगताना तुम्ही नवीन कषाय करता, आणि नवीन कर्म बांधता</span>. एक संपतं, दुसरं सुरू होतं.',
      '<span class="emphasis">जाणूनबुजून (सकाम निर्जरा)</span> — तप, ध्यान, आणि अभ्यासाने कर्म मुदतीआधीच झटकता येतं. हेच खरं काम आहे.',
    ]),
    s5_q: "जुनं कर्म आधीच कसं काढायचं?",
    s5_body: s([
      'सकाम निर्जरेचे मार्ग:',

    if (strings[key] !== undefined) el.textContent = strings[key];
  });
  document.querySelectorAll('[data-i18n-html]').forEach(el => {
    const key = el.getAttribute('data-i18n-html');
    if (strings[key] !== undefined) el.innerHTML = strings[key];
  });
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
  });
  document.documentElement.lang = lang === 'mr' ? 'mr' : lang === 'hi' ? 'hi' : 'en';
  localStorage.setItem('jainverse-lang', lang);
}

      const isPast = ai < curArc || (ai === curArc && pi < curIdx);
      const cls = isCurrent ? 'current' : isPast ? 'past' : 'future';
      if (pi > 0) {
        html += '<div class="timeline-connector' + (isPast || isCurrent ? ' filled' : '') + '"></div>';
      }
      html += '<a href="' + p.url + '" class="timeline-step ' + cls + '">';
      html += '<div class="timeline-dot">' + num + '</div>';
      html += '<span class="timeline-step-label" data-tl-idx="' + ai + '-' + pi + '"></span>';
      html += '</a>';
    });
    html += '</div>';
    if (ai < arcs.length - 1) html += '<div class="timeline-arc-sep"></div>';
  });
  html += '</div>';
  nav.innerHTML = html;

  document.getElementById('topbar').after(nav);

  function updateTimelineLabels(lang) {
    arcs.forEach((arc, ai) => {
      arc.forEach((p, pi) => {
        const el = document.querySelector('[data-tl-idx="' + ai + '-' + pi + '"]');
        if (el) el.textContent = p[lang] || p.en;
      });
    });
  }

  const origSetLang = window.setLang || setLang;
  const wrappedSetLang = function(lang) {
    origSetLang(lang);
    updateTimelineLabels(lang);
  };
  window.setLang = wrappedSetLang;
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.onclick = () => wrappedSetLang(btn.getAttribute('data-lang'));
  });

  updateTimelineLabels(localStorage.getItem('jainverse-lang') || 'mr');

  if (curArc >= 0) {
    const currentDot = nav.querySelector('.timeline-step.current');
    if (currentDot) {
      setTimeout(() => {
        currentDot.scrollIntoView({ inline: 'center', block: 'nearest', behavior: 'instant' });
      }, 50);
    }
  }

  window.addEventListener('scroll', () => {
    nav.classList.toggle('scrolled', window.scrollY > 30);
  }, { passive: true });
})();
</script>

</body>
</html>
