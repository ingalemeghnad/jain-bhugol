<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>जीव आणि कर्म — Jainverse</title>
<meta name="description" content="आत्मा आणि कर्म — जैन तत्त्वज्ञानाची सोप्या भाषेत ओळख.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Tiro+Devanagari+Hindi:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --saffron: #e07830;
    --saffron-deep: #c45e1a;
    --saffron-light: #f4a560;
    --indigo: #1a2744;
    --indigo-mid: #2a3d66;
    --indigo-light: #3d5a8a;
    --gold: #c9a84c;
    --gold-light: #e4cf8a;
    --sand: #f5f0e8;
    --sand-dark: #e8dfd0;
    --warm-white: #faf8f4;
    --stone: #8c7e6a;
    --stone-light: #b0a48e;
    --text: #2a2318;
    --text-secondary: #5c5246;
    --text-tertiary: #8a7e6e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html {
    scroll-behavior: smooth;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    font-family: 'Instrument Sans', 'Tiro Devanagari Hindi', sans-serif;
    color: var(--text);
    background: var(--warm-white);
    overflow-x: hidden;
  }

  /* Noise overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9999;
    opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px 200px;
  }

  /* ---- Top bar ---- */
  .topbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    padding: 18px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: background 0.4s, box-shadow 0.4s, padding 0.4s;
  }

  .topbar.scrolled {
    background: rgba(250, 248, 244, 0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    box-shadow: 0 1px 0 rgba(0,0,0,0.06);
    padding: 13px 40px;
  }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-secondary);
    text-decoration: none;
    transition: color 0.25s;
  }

  .back-link:hover { color: var(--saffron-deep); }

  .back-link svg {
    width: 16px;
    height: 16px;
    transition: transform 0.25s;
  }

  .back-link:hover svg { transform: translateX(-3px); }

  .lang-switch {
    display: flex;
    align-items: center;
    gap: 0;
    border: 1px solid var(--sand-dark);
    border-radius: 20px;
    overflow: hidden;
    background: rgba(245, 240, 232, 0.6);
  }

  .lang-btn {
    padding: 5px 12px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-tertiary);
    background: none;
    border: none;
    cursor: pointer;
    transition: all 0.25s;
    font-family: 'Instrument Sans', 'Tiro Devanagari Hindi', sans-serif;
    white-space: nowrap;
  }

  .lang-btn:hover { color: var(--text-secondary); }

  .lang-btn.active {
    background: var(--indigo);
    color: var(--sand);
    font-weight: 600;
  }

  .lang-divider {
    width: 1px;
    height: 16px;
    background: var(--sand-dark);
  }

  /* ---- Timeline ---- */
  .timeline-bar {
    position: fixed;
    top: 56px;
    left: 0;
    right: 0;
    z-index: 99;
    background: rgba(250, 248, 244, 0.95);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(0,0,0,0.06);
    overflow-x: auto;
    overflow-y: hidden;
    transition: top 0.4s;
    -ms-overflow-style: none;
    scrollbar-width: none;
  }
  .timeline-bar::-webkit-scrollbar { display: none; }
  .topbar.scrolled ~ .timeline-bar { top: 46px; }

  .timeline-inner {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    gap: 16px;
    padding: 10px 24px 8px;
    min-width: max-content;
  }

  .timeline-track {
    display: flex;
    align-items: flex-start;
  }

  .timeline-step {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-decoration: none;
    gap: 3px;
  }

  .timeline-dot {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 600;
    font-family: 'Instrument Sans', sans-serif;
    transition: all 0.25s;
    flex-shrink: 0;
  }

  .timeline-step.past .timeline-dot {
    background: var(--indigo);
    color: var(--sand);
    border: 2px solid var(--indigo);
  }

  .timeline-step.current .timeline-dot {
    background: var(--saffron);
    color: white;
    border: 2px solid var(--saffron);
    transform: scale(1.15);
    box-shadow: 0 0 0 3px rgba(224, 120, 48, 0.2);
  }

  .timeline-step.future .timeline-dot {
    background: transparent;
    color: var(--stone-light);
    border: 2px solid var(--sand-dark);
  }

  .timeline-step:hover .timeline-dot {
    border-color: var(--saffron-light);
    color: var(--saffron);
  }

  .timeline-step-label {
    font-size: 9px;
    font-weight: 500;
    color: var(--text-tertiary);
    white-space: nowrap;
    font-family: 'Instrument Sans', 'Tiro Devanagari Hindi', sans-serif;
  }

  .timeline-step.current .timeline-step-label {
    color: var(--saffron-deep);
    font-weight: 600;
  }

  .timeline-connector {
    width: 14px;
    height: 2px;
    background: var(--sand-dark);
    flex-shrink: 0;
    margin-top: 10px;
  }

  .timeline-connector.filled {
    background: var(--indigo);
  }

  .timeline-arc-sep {
    width: 1px;
    height: 30px;
    background: var(--sand-dark);
    flex-shrink: 0;
    margin-top: 6px;
  }

  /* ---- Article layout ---- */
  .article {
    max-width: 640px;
    margin: 0 auto;
    padding: 200px 28px 100px;
  }

  /* ---- Page header ---- */
  .page-header {
    margin-bottom: 72px;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 0.8s 0.2s forwards;
  }

  .page-header h1 {
    font-family: 'DM Serif Display', 'Tiro Devanagari Hindi', serif;
    font-size: clamp(36px, 5vw, 52px);
    color: var(--indigo);
    line-height: 1.15;
    letter-spacing: -0.5px;
    margin-bottom: 12px;
  }

  .page-header .subtitle {
    font-family: 'DM Serif Display', 'Tiro Devanagari Hindi', serif;
    font-style: italic;
    font-size: clamp(16px, 2vw, 20px);
    color: var(--stone);
    line-height: 1.4;
  }

  .header-rule {
    width: 48px;
    height: 2px;
    background: var(--saffron);
    margin-top: 28px;
    opacity: 0.7;
  }

  /* ---- Sections ---- */
  .section {
    margin-bottom: 80px;
    position: relative;
  }

  .section-num {
    font-family: 'DM Serif Display', serif;
    font-size: 80px;
    color: var(--sand-dark);
    line-height: 1;
    margin-bottom: -12px;
    user-select: none;
  }

  .section-question {
    font-family: 'DM Serif Display', 'Tiro Devanagari Hindi', serif;
    font-size: clamp(24px, 3.5vw, 32px);
    color: var(--indigo);
    line-height: 1.25;
    margin-bottom: 28px;
    letter-spacing: -0.3px;
  }

  .section-body {
    font-size: 17px;
    line-height: 2;
    color: var(--text-secondary);
  }

  .section-body .sentence {
    display: block;
    margin-bottom: 12px;
  }

  .section-body .emphasis {
    color: var(--text);
    font-weight: 500;
  }

  .section-body .term {
    color: var(--saffron-deep);
    font-weight: 500;
  }

  /* Decorative divider between sections */
  .section-divider {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin: 80px 0;
    color: var(--sand-dark);
    user-select: none;
  }

  .section-divider::before,
  .section-divider::after {
    content: '';
    height: 1px;
    width: 40px;
    background: linear-gradient(90deg, transparent, var(--sand-dark));
  }

  .section-divider::after {
    background: linear-gradient(90deg, var(--sand-dark), transparent);
  }

  .section-divider span {
    font-size: 14px;
    color: var(--stone-light);
  }

  /* ---- Scroll reveal ---- */
  .reveal {
    opacity: 0;
    transform: translateY(24px);
    transition: opacity 0.7s cubic-bezier(0.4, 0, 0.2, 1),
                transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .reveal.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* ---- Next read ---- */
  .next-read {
    margin-top: 80px;
    padding: 28px 32px;
    background: var(--sand);
    border-radius: 8px;
    text-decoration: none;
    color: inherit;
    display: block;
    transition: all 0.3s;
  }

  .next-read:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(42, 35, 24, 0.08);
  }

  .next-read-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--saffron);
    margin-bottom: 8px;
  }

  .next-read-title {
    font-family: 'DM Serif Display', 'Tiro Devanagari Hindi', serif;
    font-size: 22px;
    color: var(--indigo);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .next-read-title svg {
    width: 18px;
    height: 18px;
    color: var(--saffron);
    transition: transform 0.3s;
  }

  .next-read:hover .next-read-title svg { transform: translateX(4px); }

  /* ---- Footer ---- */
  .article-footer {
    margin-top: 100px;
    padding-top: 32px;
    border-top: 1px solid var(--sand-dark);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .article-footer .brand {
    font-family: 'DM Serif Display', serif;
    font-size: 16px;
    color: var(--stone);
    text-decoration: none;
  }

  .article-footer .note {
    font-size: 12px;
    color: var(--text-tertiary);
  }

  /* ---- Animations ---- */
  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  /* ---- Responsive ---- */
  @media (max-width: 600px) {
    .topbar { padding: 14px 18px; }
    .topbar.scrolled { padding: 11px 18px; }
    .timeline-bar { top: 48px; }
    .topbar.scrolled ~ .timeline-bar { top: 42px; }
    .timeline-inner { padding: 8px 16px 6px; gap: 12px; }
    .timeline-dot { width: 20px; height: 20px; font-size: 9px; }
    .timeline-connector { width: 10px; margin-top: 9px; }
    .timeline-step-label { font-size: 8px; }
    .article { padding: 160px 20px 60px; }
    .page-header { margin-bottom: 52px; }
    .section { margin-bottom: 56px; }
    .section-num { font-size: 56px; margin-bottom: -8px; }
    .section-question { font-size: 22px; margin-bottom: 20px; }
    .section-body { font-size: 16px; line-height: 1.9; }
    .section-divider { margin: 56px 0; }
    .next-read { padding: 22px 24px; }
    .next-read-title { font-size: 19px; }
    .article-footer { flex-direction: column; gap: 8px; text-align: center; }
    .lang-btn { padding: 4px 9px; font-size: 11px; }
  }
</style>
</head>

<!-- Top bar -->
<div class="topbar" id="topbar">

<script>

  return sentences.map(t => {
    // Wrap terms in .term spans and emphasis in .emphasis spans
    return '<span class="sentence">' + t + '</span>';
  }).join('');
}

// ---- Language switching ----
function setLang(lang) {
  const strings = i18n[lang];
  if (!strings) return;

  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (strings[key] !== undefined) el.textContent = strings[key];
  });

  document.querySelectorAll('[data-i18n-html]').forEach(el => {
    const key = el.getAttribute('data-i18n-html');
    if (strings[key] !== undefined) el.innerHTML = strings[key];
  });

  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
  });

  document.documentElement.lang = lang === 'mr' ? 'mr' : lang === 'hi' ? 'hi' : 'en';
  localStorage.setItem('jainverse-lang', lang);
}

document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => setLang(btn.getAttribute('data-lang')));
});

const savedLang = localStorage.getItem('jainverse-lang') || 'mr';
setLang(savedLang);

// ---- Sticky topbar ----
window.addEventListener('scroll', () => {
  document.getElementById('topbar').classList.toggle('scrolled', window.scrollY > 30);
}, { passive: true });

// ---- Scroll reveal ----
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('visible');
      observer.unobserve(entry.target);
    }
  });
}, { threshold: 0.12, rootMargin: '0px 0px -30px 0px' });

document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

// ---- Timeline ----
(function() {
  const arcs = [
    [
      { url: '/jeev-ajeev/', mr: 'जीव', hi: 'जीव', en: 'Jeev' },
      { url: '/kashaya/', mr: 'कषाय', hi: 'कषाय', en: 'Kashaya' },
      { url: '/ajiva/', mr: 'अजीव', hi: 'अजीव', en: 'Ajiva' },
      { url: '/karma/', mr: 'कर्म', hi: 'कर्म', en: 'Karma' },
      { url: '/ashrav-bandh/', mr: 'आश्रव-बंध', hi: 'आस्रव-बंध', en: 'Ashrav' },
      { url: '/samvar-nirjara/', mr: 'संवर', hi: 'संवर', en: 'Samvar' },
      { url: '/moksha/', mr: 'मोक्ष', hi: 'मोक्ष', en: 'Moksha' },
      { url: '/summary/', mr: 'सारांश', hi: 'सारांश', en: 'Summary' },
    ],
    [
      { url: '/ratnatraya/', mr: 'रत्नत्रय', hi: 'रत्नत्रय', en: 'Ratnatraya' },
      { url: '/punya-paap/', mr: 'पुण्य-पाप', hi: 'पुण्य-पाप', en: 'Punya' },
      { url: '/ahimsa/', mr: 'अहिंसा', hi: 'अहिंसा', en: 'Ahimsa' },
      { url: '/panch-mahavrat/', mr: 'महाव्रत', hi: 'महाव्रत', en: 'Vows' },
      { url: '/panch-parmeshthi/', mr: 'परमेष्ठी', hi: 'परमेष्ठी', en: 'Parmeshthi' },
      { url: '/namokar-mantra/', mr: 'णमोकार', hi: 'णमोकार', en: 'Namokar' },
      { url: '/summary-2/', mr: 'सारांश', hi: 'सारांश', en: 'Summary' },
    ]
  ];

  const path = window.location.pathname;
  let curArc = -1, curIdx = -1;
  arcs.forEach((arc, ai) => {
    arc.forEach((p, pi) => {
      if (p.url === path) { curArc = ai; curIdx = pi; }
    });
  });

  const nav = document.createElement('nav');
  nav.className = 'timeline-bar';
  nav.id = 'timeline-bar';

  let num = 0;
  let html = '<div class="timeline-inner">';
  arcs.forEach((arc, ai) => {
    html += '<div class="timeline-track">';
    arc.forEach((p, pi) => {
      num++;
      const isCurrent = ai === curArc && pi === curIdx;
      const isPast = ai < curArc || (ai === curArc && pi < curIdx);
      const cls = isCurrent ? 'current' : isPast ? 'past' : 'future';
      if (pi > 0) {
        html += '<div class="timeline-connector' + (isPast || isCurrent ? ' filled' : '') + '"></div>';
      }
      html += '<a href="' + p.url + '" class="timeline-step ' + cls + '">';
      html += '<div class="timeline-dot">' + num + '</div>';
      html += '<span class="timeline-step-label" data-tl-idx="' + ai + '-' + pi + '"></span>';
      html += '</a>';
    });
    html += '</div>';
    if (ai < arcs.length - 1) html += '<div class="timeline-arc-sep"></div>';
  });
  html += '</div>';
  nav.innerHTML = html;

  document.getElementById('topbar').after(nav);

  // Update labels on lang change
  function updateTimelineLabels(lang) {
    arcs.forEach((arc, ai) => {
      arc.forEach((p, pi) => {
        const el = document.querySelector('[data-tl-idx="' + ai + '-' + pi + '"]');
        if (el) el.textContent = p[lang] || p.en;
      });
    });
  }

  // Hook into language switching
  const origSetLang = window.setLang || setLang;
  const wrappedSetLang = function(lang) {
    origSetLang(lang);
    updateTimelineLabels(lang);
  };
  // Replace global setLang
  window.setLang = wrappedSetLang;
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.onclick = () => wrappedSetLang(btn.getAttribute('data-lang'));
  });

  // Initial labels
  updateTimelineLabels(localStorage.getItem('jainverse-lang') || 'mr');

  // Scroll to center current page on mobile
  if (curArc >= 0) {
    const currentDot = nav.querySelector('.timeline-step.current');
    if (currentDot) {
      setTimeout(() => {
        currentDot.scrollIntoView({ inline: 'center', block: 'nearest', behavior: 'instant' });
      }, 50);
    }
  }

  // Sync scrolled state with topbar
  window.addEventListener('scroll', () => {
    nav.classList.toggle('scrolled', window.scrollY > 30);
  }, { passive: true });
})();
</script>
