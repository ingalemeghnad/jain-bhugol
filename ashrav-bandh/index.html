<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>आस्रव आणि बंध — Jainverse</title>
<meta name="description" content="कर्म आत्म्यात कसं शिरतं आणि कसं लॉक होतं — आस्रव आणि बंधाची ओळख.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Tiro+Devanagari+Hindi:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --saffron: #e07830;
    --saffron-deep: #c45e1a;
    --saffron-light: #f4a560;
    --indigo: #1a2744;
    --indigo-mid: #2a3d66;
    --indigo-light: #3d5a8a;
    --gold: #c9a84c;
    --gold-light: #e4cf8a;
    --sand: #f5f0e8;
    --sand-dark: #e8dfd0;
    --warm-white: #faf8f4;
    --stone: #8c7e6a;
    --stone-light: #b0a48e;
    --text: #2a2318;
    --text-secondary: #5c5246;
    --text-tertiary: #8a7e6e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html {
    scroll-behavior: smooth;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    font-family: 'Instrument Sans', 'Tiro Devanagari Hindi', sans-serif;
    color: var(--text);
    background: var(--warm-white);
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9999;
    opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px 200px;
  }

  .topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 18px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: background 0.4s, box-shadow 0.4s, padding 0.4s;
  }

  .topbar.scrolled {
    background: rgba(250, 248, 244, 0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    box-shadow: 0 1px 0 rgba(0,0,0,0.06);
    padding: 13px 40px;
  }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-secondary);
    text-decoration: none;
    transition: color 0.25s;
  }

  .back-link:hover { color: var(--saffron-deep); }
  .back-link svg { width: 16px; height: 16px; transition: transform 0.25s; }
  .back-link:hover svg { transform: translateX(-3px); }

  .lang-switch {
    display: flex;
    align-items: center;
    border: 1px solid var(--sand-dark);
    border-radius: 20px;
    overflow: hidden;
    background: rgba(245, 240, 232, 0.6);
  }

  .lang-btn {
    padding: 5px 12px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-tertiary);
    background: none;
    border: none;
    cursor: pointer;
    transition: all 0.25s;
    font-family: 'Instrument Sans', 'Tiro Devanagari Hindi', sans-serif;
    white-space: nowrap;
  }

  .lang-btn:hover { color: var(--text-secondary); }
  .lang-btn.active { background: var(--indigo); color: var(--sand); font-weight: 600; }
  .lang-divider { width: 1px; height: 16px; background: var(--sand-dark); }

  .article {
    max-width: 640px;
    margin: 0 auto;
    padding: 140px 28px 100px;
  }

  .page-header {
    margin-bottom: 72px;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 0.8s 0.2s forwards;
  }

  .page-header h1 {
    font-family: 'DM Serif Display', 'Tiro Devanagari Hindi', serif;
    font-size: clamp(36px, 5vw, 52px);
    color: var(--indigo);
    line-height: 1.15;
    letter-spacing: -0.5px;
    margin-bottom: 12px;
  }

  .page-header .subtitle {
    font-family: 'DM Serif Display', 'Tiro Devanagari Hindi', serif;
    font-style: italic;
    font-size: clamp(16px, 2vw, 20px);
    color: var(--stone);
    line-height: 1.4;
  }

  .header-rule {
    width: 48px;
    height: 2px;
    background: var(--saffron);
    margin-top: 28px;
    opacity: 0.7;
  }

  .section {
    margin-bottom: 80px;
    position: relative;
  }

  .section-num {
    font-family: 'DM Serif Display', serif;
    font-size: 80px;
    color: var(--sand-dark);
    line-height: 1;
    margin-bottom: -12px;
    user-select: none;
  }

  .section-question {
    font-family: 'DM Serif Display', 'Tiro Devanagari Hindi', serif;
    font-size: clamp(24px, 3.5vw, 32px);
    color: var(--indigo);
    line-height: 1.25;
    margin-bottom: 28px;
    letter-spacing: -0.3px;
  }

  .section-body {
    font-size: 17px;
    line-height: 2;
    color: var(--text-secondary);
  }

  .section-body .sentence { display: block; margin-bottom: 12px; }
  .section-body .emphasis { color: var(--text); font-weight: 500; }
  .section-body .term { color: var(--saffron-deep); font-weight: 500; }

  .section-divider {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin: 80px 0;
    color: var(--sand-dark);
    user-select: none;
  }

  .section-divider::before,
  .section-divider::after {
    content: '';
    height: 1px;
    width: 40px;
    background: linear-gradient(90deg, transparent, var(--sand-dark));
  }

  .section-divider::after {
    background: linear-gradient(90deg, var(--sand-dark), transparent);
  }

  .section-divider span { font-size: 14px; color: var(--stone-light); }

  .next-read {
    padding: 28px 32px;
    background: var(--sand);
    border-radius: 8px;
    text-decoration: none;
    color: inherit;
    display: block;
    transition: all 0.3s;
  }

  .next-read:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(42, 35, 24, 0.08);
  }

  .next-read-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--saffron);
    margin-bottom: 8px;
  }

  .next-read-title {
    font-family: 'DM Serif Display', 'Tiro Devanagari Hindi', serif;
    font-size: 22px;
    color: var(--indigo);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .next-read-title svg {
    width: 18px;
    height: 18px;
    color: var(--saffron);
    transition: transform 0.3s;
  }

  .next-read:hover .next-read-title svg { transform: translateX(4px); }

  .page-nav {
    display: flex;
    gap: 16px;
    margin-top: 80px;
  }

  .page-nav .next-read {
    margin-top: 0;
    flex: 1;
  }

  .prev-read {
    flex: 1;
    padding: 28px 32px;
    background: var(--sand);
    border-radius: 8px;
    text-decoration: none;
    color: inherit;
    display: block;
    transition: all 0.3s;
  }

  .prev-read:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(42, 35, 24, 0.08);
  }

  .prev-read-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--stone-light);
    margin-bottom: 8px;
  }

  .prev-read-title {
    font-family: 'DM Serif Display', 'Tiro Devanagari Hindi', serif;
    font-size: 22px;
    color: var(--indigo);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .prev-read-title svg {
    width: 18px;
    height: 18px;
    color: var(--stone-light);
    transition: transform 0.3s;
  }

  .prev-read:hover .prev-read-title svg { transform: translateX(-4px); }

  .article-footer {
    margin-top: 60px;
    padding-top: 32px;
    border-top: 1px solid var(--sand-dark);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .article-footer .brand {
    font-family: 'DM Serif Display', serif;
    font-size: 16px;
    color: var(--stone);
    text-decoration: none;
  }

  .article-footer .note { font-size: 12px; color: var(--text-tertiary); }

  .reveal {
    opacity: 0;
    transform: translateY(24px);
    transition: opacity 0.7s cubic-bezier(0.4, 0, 0.2, 1),
                transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .reveal.visible { opacity: 1; transform: translateY(0); }

  @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

  @media (max-width: 600px) {
    .topbar { padding: 14px 18px; }
    .topbar.scrolled { padding: 11px 18px; }
    .article { padding: 110px 20px 60px; }
    .page-header { margin-bottom: 52px; }
    .section { margin-bottom: 56px; }
    .section-num { font-size: 56px; margin-bottom: -8px; }
    .section-question { font-size: 22px; margin-bottom: 20px; }
    .section-body { font-size: 16px; line-height: 1.9; }
    .section-divider { margin: 56px 0; }
    .next-read { padding: 22px 24px; }
    .next-read-title { font-size: 19px; }
    .prev-read { padding: 22px 24px; }
    .prev-read-title { font-size: 19px; }
    .page-nav { flex-direction: column; }
    .article-footer { flex-direction: column; gap: 8px; text-align: center; }
    .lang-btn { padding: 4px 9px; font-size: 11px; }
  }
</style>
</head>
<body>

<div class="topbar" id="topbar">
  <a href="/karma/" class="back-link">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M13 8H3M7 4l-4 4 4 4"/>
    </svg>
    <span data-i18n="back_text"></span>
  </a>
  <div class="lang-switch">
    <button class="lang-btn" data-lang="mr">मराठी</button>
    <span class="lang-divider"></span>
    <button class="lang-btn" data-lang="hi">हिन्दी</button>
    <span class="lang-divider"></span>
    <button class="lang-btn" data-lang="en">Eng</button>
  </div>
</div>

<article class="article">

  <header class="page-header">
    <h1 data-i18n="page_title"></h1>
    <p class="subtitle" data-i18n="page_subtitle"></p>
    <div class="header-rule"></div>
  </header>

  <section class="section reveal">
    <div class="section-num">1</div>
    <h2 class="section-question" data-i18n="s1_q"></h2>
    <div class="section-body" data-i18n-html="s1_body"></div>
  </section>

  <div class="section-divider reveal"><span>◆</span></div>

  <section class="section reveal">
    <div class="section-num">2</div>
    <h2 class="section-question" data-i18n="s2_q"></h2>
    <div class="section-body" data-i18n-html="s2_body"></div>
  </section>

  <div class="section-divider reveal"><span>◆</span></div>

  <section class="section reveal">
    <div class="section-num">3</div>
    <h2 class="section-question" data-i18n="s3_q"></h2>
    <div class="section-body" data-i18n-html="s3_body"></div>
  </section>

  <div class="section-divider reveal"><span>◆</span></div>

  <section class="section reveal">
    <div class="section-num">4</div>
    <h2 class="section-question" data-i18n="s4_q"></h2>
    <div class="section-body" data-i18n-html="s4_body"></div>
  </section>

  <div class="section-divider reveal"><span>◆</span></div>

  <section class="section reveal">
    <div class="section-num">5</div>
    <h2 class="section-question" data-i18n="s5_q"></h2>
    <div class="section-body" data-i18n-html="s5_body"></div>
  </section>

  <div class="section-divider reveal"><span>◆</span></div>

  <section class="section reveal">
    <div class="section-num">6</div>
    <h2 class="section-question" data-i18n="s6_q"></h2>
    <div class="section-body" data-i18n-html="s6_body"></div>
  </section>

  <!-- Prev / Next -->
  <div class="page-nav reveal">
    <a href="/karma/" class="prev-read">
      <div class="prev-read-label" data-i18n="prev_label"></div>
      <div class="prev-read-title">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 8H3M7 4l-4 4 4 4"/></svg>
        <span data-i18n="prev_title"></span>
      </div>
    </a>
    <a href="/samvar-nirjara/" class="next-read">
      <div class="next-read-label" data-i18n="next_label"></div>
      <div class="next-read-title">
        <span data-i18n="next_title"></span>
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8h10M9 4l4 4-4 4"/></svg>
      </div>
    </a>
  </div>

  <footer class="article-footer reveal">
    <a href="/" class="brand">Jainverse</a>
    <span class="note" data-i18n="footer_note"></span>
  </footer>

</article>

<script>
function s(sentences) {
  return sentences.map(t => '<span class="sentence">' + t + '</span>').join('');
}

const i18n = {
  mr: {
    page_title: "आस्रव आणि बंध",
    page_subtitle: "कर्म आत्म्यात कसं शिरतं — आणि कसं लॉक होतं?",
    s1_q: "दरवाजे कुठे आहेत?",
    s1_body: s([
      'तुम्ही आता आठ प्रकारचं कर्म पाहिलंय — प्रत्येकाचं काम वेगळं.',
      'पण हे कर्म आत्म्यापर्यंत पोहोचतं कसं? काहीतरी दरवाजा असणार ज्यातून कर्माचे कण आत शिरतात.',
      '<span class="emphasis">ते दरवाजे म्हणजे तुझे मन, वाणी आणि शरीर.</span>',
      'तू विचार करतोस — मनाचा दरवाजा उघडतो. बोलतोस — वाणीचा. कृती करतोस — शरीराचा.',
      'या तिन्हींच्या हालचालीला <span class="term">योग</span> म्हणतात — इथे योग म्हणजे आसनं नाही, तर मन-वाणी-शरीराची सक्रियता.',
      'योग असेल तिथे कर्माचे कण आत शिरतात — या शिरण्याच्या प्रक्रियेला <span class="term">आस्रव</span> म्हणतात.',
    ]),
    s2_q: "आस्रव सारखाच असतो का?",
    s2_body: s([
      'नाही — सगळ्या हालचाली सारखं कर्म आत आणत नाहीत.',
      'शांत मनाने केलेलं काम आणि रागात केलेलं काम — दोन्हीत योग आहे, दोन्हीत आस्रव आहे. पण फरक प्रचंड आहे.',
      'कारण फक्त योग पुरेसा नाही — <span class="emphasis">कषाय (क्रोध, मान, माया, लोभ) नसेल तर कर्म शिरतं पण चिकटत नाही</span>.',
      'समजा दोन माणसं धुळीत खेळतात. एकाने अंगाला तेल लावलंय — धूळ सगळीकडे चिकटते. दुसरा कोरड्या अंगाने खेळतो — धूळ लागते पण झटकली की निघून जाते.',
      'कषायासह आस्रव म्हणजे तेल लावलेल्या अंगावरची धूळ — चिकटतेच. कषायाशिवाय आस्रव म्हणजे कोरड्या अंगावरची — झटकता येते.',
    ]),
    s3_q: "शिरलं — मग पुढे काय?",
    s3_body: s([
      'कर्म शिरलं — आता ते आत्म्याशी जोडलं जातं. हे जोडणं म्हणजे <span class="term">बंध</span>.',
      'बंध म्हणजे फक्त "चिकटलं" एवढं सोपं नाही. बंध चार गोष्टी ठरवतो:',
      '<span class="emphasis">कुठल्या प्रकारचं कर्म बांधलं?</span> — आठ पैकी कोणतं? ज्ञानावरणीय, मोहनीय, वेदनीय…? हे तुझ्या कृतीच्या स्वरूपावर अवलंबून आहे.',
      '<span class="emphasis">किती तीव्र?</span> — सौम्य की तीव्र? सारखंच खोटं बोललं तरी एकदा चुकून बोललं आणि सवयीने बोललं — तीव्रता वेगळी. हे कषायाच्या तीव्रतेवर अवलंबून आहे.',
      '<span class="emphasis">किती काळ टिकेल?</span> — काही कर्म क्षणात संपतं, काही युगं टिकतं. हेसुद्धा कषायाच्या खोलीवर ठरतं.',
      '<span class="emphasis">किती प्रमाणात?</span> — थोडंसं की ढीगभर? योगाची तीव्रता आणि कषायाची ताकद मिळून हे ठरवतात.',
    ]),
    s4_q: "एक उदाहरण",
    s4_body: s([
      'दोन माणसं रागात बोलतात.',
      'पहिला — क्षणिक चिडचिड, लगेच शांत, पश्चात्ताप. कर्म बांधलं — पण सौम्य, अल्पकाळ टिकणारं.',
      'दुसरा — खोल द्वेष, वर्षानुवर्षे धरून ठेवतो, बदला घ्यायची इच्छा. कर्म बांधलं — तीव्र, दीर्घकाळ, जड.',
      '<span class="emphasis">कृती सारखी दिसली — पण आतला भाव पूर्ण वेगळा. आणि बंध पूर्ण वेगळा.</span>',
      'म्हणूनच जैन तत्त्वज्ञान नेहमी बाहेरच्या कृतीपेक्षा आतल्या भावाकडे बघतं.',
    ]),
    s5_q: "मग सगळं करणंच सोडायचं?",
    s5_body: s([
      'नाही — जोपर्यंत शरीरात आहात तोपर्यंत योग (मन-वाणी-शरीराची हालचाल) असणारच. आस्रव पूर्ण थांबवणं हे सर्वोच्च अवस्थेत होतं — तिथपर्यंतचा प्रवास हळूहळू आहे.',
      'प्रश्न "काही करू नका" हा नाही — प्रश्न "करताना आत काय चाललंय" हा आहे.',
      '<span class="emphasis">कषाय कमी झाल्या की कर्म शिरतं पण बांधत नाही. कषाय पूर्ण गेल्या की बंधच थांबतो.</span>',
      'विचार करा — तुम्ही श्वास घेता, हवेत धूळ असते, ती नाकात जाते. पण नाकातले केस बरीचशी धूळ अडवतात.',
      'कषायमुक्त जगणं म्हणजे असा फिल्टर — कर्माचे कण येतात, पण चिकटत नाहीत.',
    ]),
    s6_q: "आतापर्यंतचं चित्र",

function setLang(lang) {
  const strings = i18n[lang];
  if (!strings) return;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (strings[key] !== undefined) el.textContent = strings[key];
  });
  document.querySelectorAll('[data-i18n-html]').forEach(el => {
    const key = el.getAttribute('data-i18n-html');
    if (strings[key] !== undefined) el.innerHTML = strings[key];
  });
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
  });
  document.documentElement.lang = lang === 'mr' ? 'mr' : lang === 'hi' ? 'hi' : 'en';
  localStorage.setItem('jainverse-lang', lang);
}

document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => setLang(btn.getAttribute('data-lang')));
});

setLang(localStorage.getItem('jainverse-lang') || 'mr');

window.addEventListener('scroll', () => {
  document.getElementById('topbar').classList.toggle('scrolled', window.scrollY > 30);
}, { passive: true });

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('visible');
      observer.unobserve(entry.target);
    }
  });
}, { threshold: 0.12, rootMargin: '0px 0px -30px 0px' });

document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
