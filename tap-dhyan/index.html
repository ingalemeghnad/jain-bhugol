<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>तप आणि ध्यान — Jainverse</title>
<meta name="description" content="तप आणि ध्यान — साधनेची प्रत्यक्ष पद्धत, सोप्या भाषेत.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Tiro+Devanagari+Hindi:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root { --saffron:#e07830; --saffron-deep:#c45e1a; --indigo:#1a2744; --sand:#f5f0e8; --sand-dark:#e8dfd0; --warm-white:#faf8f4; --stone:#8c7e6a; --stone-light:#b0a48e; --text:#2a2318; --text-secondary:#5c5246; --text-tertiary:#8a7e6e; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  body { font-family: 'Instrument Sans', 'Tiro Devanagari Hindi', sans-serif; color: var(--text); background: var(--warm-white); overflow-x: hidden; }
  body::before { content:''; position:fixed; inset:0; pointer-events:none; z-index:9999; opacity:.025; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); background-size:200px 200px; }
  .topbar { position:fixed; top:0; left:0; right:0; z-index:100; padding:18px 40px; display:flex; align-items:center; justify-content:space-between; transition:background .4s, box-shadow .4s, padding .4s; }
  .topbar.scrolled { background:rgba(250,248,244,.92); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); box-shadow:0 1px 0 rgba(0,0,0,.06); padding:13px 40px; }
  .back-link { display:inline-flex; align-items:center; gap:8px; font-size:14px; font-weight:500; color:var(--text-secondary); text-decoration:none; transition:color .25s; }
  .back-link:hover { color:var(--saffron-deep); }
  .back-link svg { width:16px; height:16px; transition:transform .25s; }
  .back-link:hover svg { transform:translateX(-3px); }
  .lang-switch { display:flex; align-items:center; border:1px solid var(--sand-dark); border-radius:20px; overflow:hidden; background:rgba(245,240,232,.6); }
  .lang-btn { padding:5px 12px; font-size:12px; font-weight:500; color:var(--text-tertiary); background:none; border:none; cursor:pointer; transition:all .25s; font-family:'Instrument Sans', 'Tiro Devanagari Hindi', sans-serif; white-space:nowrap; }
  .lang-btn:hover { color:var(--text-secondary); }
  .lang-btn.active { background:var(--indigo); color:var(--sand); font-weight:600; }
  .lang-divider { width:1px; height:16px; background:var(--sand-dark); }
  .article { max-width:640px; margin:0 auto; padding:140px 28px 100px; }
  .page-header { margin-bottom:72px; opacity:0; transform:translateY(20px); animation:fadeUp .8s .2s forwards; }
  .page-header h1 { font-family:'DM Serif Display', 'Tiro Devanagari Hindi', serif; font-size:clamp(36px, 5vw, 52px); color:var(--indigo); line-height:1.15; letter-spacing:-.5px; margin-bottom:12px; }
  .page-header .subtitle { font-family:'DM Serif Display', 'Tiro Devanagari Hindi', serif; font-style:italic; font-size:clamp(16px, 2vw, 20px); color:var(--stone); line-height:1.4; }
  .header-rule { width:48px; height:2px; background:var(--saffron); margin-top:28px; opacity:.7; }
  .section { margin-bottom:80px; position:relative; }
  .section-num { font-family:'DM Serif Display', serif; font-size:80px; color:var(--sand-dark); line-height:1; margin-bottom:-12px; user-select:none; }
  .section-question { font-family:'DM Serif Display', 'Tiro Devanagari Hindi', serif; font-size:clamp(24px, 3.5vw, 32px); color:var(--indigo); line-height:1.25; margin-bottom:28px; letter-spacing:-.3px; }
  .section-body { font-size:17px; line-height:2; color:var(--text-secondary); }
  .section-body .sentence { display:block; margin-bottom:12px; }
  .section-body .emphasis { color:var(--text); font-weight:500; }
  .section-body .term { color:var(--saffron-deep); font-weight:500; }
  .foldout { margin-top:28px; border:1px solid var(--sand-dark); border-radius:8px; background:var(--sand); padding:14px 22px; }
  .foldout summary { font-size:13px; font-weight:600; letter-spacing:.5px; color:var(--saffron-deep); list-style:none; display:flex; align-items:center; gap:10px; cursor:pointer; user-select:none; padding:4px 0; }
  .foldout summary::-webkit-details-marker { display:none; }
  .foldout summary::before { content:''; width:0; height:0; border-left:5px solid var(--saffron); border-top:4px solid transparent; border-bottom:4px solid transparent; transition:transform .2s; display:inline-block; }
  .foldout[open] summary::before { transform:rotate(90deg); }
  .foldout-body { margin-top:14px; padding-top:14px; border-top:1px solid var(--sand-dark); font-size:15px; line-height:1.75; color:var(--text-secondary); }
  .foldout-body strong { color:var(--text); font-weight:600; }
  .foldout-body .group-label { display:block; margin-top:14px; margin-bottom:8px; font-family:'DM Serif Display', 'Tiro Devanagari Hindi', serif; font-style:italic; font-size:14px; color:var(--stone); }
  .foldout-body .group-label:first-child { margin-top:0; }
  .foldout-body ol { margin:0 0 0 20px; padding:0; }
  .foldout-body ol li { margin-bottom:5px; }
  .section-divider { display:flex; align-items:center; justify-content:center; gap:16px; margin:80px 0; color:var(--sand-dark); user-select:none; }
  .section-divider::before, .section-divider::after { content:''; height:1px; width:40px; background:linear-gradient(90deg, transparent, var(--sand-dark)); }
  .section-divider::after { background:linear-gradient(90deg, var(--sand-dark), transparent); }
  .section-divider span { font-size:14px; color:var(--stone-light); }
  .page-nav { display:flex; gap:16px; margin-top:80px; }
  .prev-read,.next-read { flex:1; padding:28px 32px; background:var(--sand); border-radius:8px; text-decoration:none; color:inherit; display:block; transition:all .3s; }
  .prev-read:hover,.next-read:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(42,35,24,.08); }
  .prev-read-label,.next-read-label { font-size:11px; font-weight:600; letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; }
  .prev-read-label { color:var(--stone-light); }
  .next-read-label { color:var(--saffron); }
  .prev-read-title,.next-read-title { font-family:'DM Serif Display', 'Tiro Devanagari Hindi', serif; font-size:22px; color:var(--indigo); display:flex; align-items:center; gap:10px; }
  .prev-read-title svg { width:18px; height:18px; color:var(--stone-light); transition:transform .3s; }
  .next-read-title svg { width:18px; height:18px; color:var(--saffron); transition:transform .3s; }
  .prev-read:hover .prev-read-title svg { transform:translateX(-4px); }
  .next-read:hover .next-read-title svg { transform:translateX(4px); }
  .article-footer { margin-top:60px; padding-top:32px; border-top:1px solid var(--sand-dark); display:flex; align-items:center; justify-content:space-between; }
  .article-footer .brand { font-family:'DM Serif Display', serif; font-size:16px; color:var(--stone); text-decoration:none; }
  .article-footer .note { font-size:12px; color:var(--text-tertiary); }
  .reveal { opacity:0; transform:translateY(24px); transition:opacity .7s cubic-bezier(.4,0,.2,1), transform .7s cubic-bezier(.4,0,.2,1); }
  .reveal.visible { opacity:1; transform:translateY(0); }
  @keyframes fadeUp { to { opacity:1; transform:translateY(0); } }
  @media (max-width:600px) {
    .topbar { padding:14px 18px; } .topbar.scrolled { padding:11px 18px; }
    .article { padding:110px 20px 60px; } .page-header { margin-bottom:52px; }
    .section { margin-bottom:56px; } .section-num { font-size:56px; margin-bottom:-8px; }
    .section-question { font-size:22px; margin-bottom:20px; }
    .section-body { font-size:16px; line-height:1.9; } .section-divider { margin:56px 0; }
    .foldout { padding:12px 18px; } .foldout-body { font-size:14px; }
    .prev-read,.next-read { padding:22px 24px; }
    .prev-read-title,.next-read-title { font-size:19px; }
    .page-nav { flex-direction:column; }
    .article-footer { flex-direction:column; gap:8px; text-align:center; }
    .lang-btn { padding:4px 9px; font-size:11px; }
  }
</style>
</head>

<script>
function s(sentences) { return sentences.map(t => '<span class="sentence">' + t + '</span>').join(''); }

const i18n = {
  mr: {
    page_title: "तप आणि ध्यान",
    page_subtitle: "साधनेची प्रत्यक्ष पद्धत",
    s1_q: "नकाशा आहे — पण चालायचं कसं?",
    s1_body: s([
      'गुणस्थानामुळे आपण कोणत्या टप्प्यावर आहोत हे समजतं.',
      'पण नकाशावर उभं राहून पुढे जात नाही — हालचाल लागते.',
      'त्या हालचालीसाठी जैन साधना दोन एकमेकांत गुंतलेली साधने देते: <span class="term">तप</span> (आत्मशुद्धीची क्रिया) आणि <span class="term">ध्यान</span> (एकाग्र जागरूकता).',
      '<span class="emphasis">तप जुनं कर्म कमी करतं. ध्यान त्या तपाला खोली देतं.</span>',
    ]),
    s2_q: "तप म्हणजे नेमकं काय?",
    s2_body: s([
      'बहुतेकांना तप म्हणजे फक्त उपवास, शरीराला कष्ट देणं — एवढंच वाटतं.',
      'पण जैन परंपरेत तप म्हणजे स्वेच्छेने स्वीकारलेली अशी शिस्त जी आसक्ती सैल करते, अहंकार वाढवत नाही.',
      'याचे दोन भाग आहेत: <span class="term">बाह्य तप</span> शरीर आणि इंद्रियांवर काम करते, <span class="term">अंतरंग तप</span> मन आणि अहंकारावर.',
      '<span class="emphasis">कौतुकासाठी केलेला लांब उपवास कर्म बांधतो. आसक्ती कमी करण्यासाठी केलेला छोटा संयम कर्म तोडतो. हेतू निर्णायक.</span>',
    ]),
    tap_foldout_label: "१२ तपांची संपूर्ण यादी",
    tap_foldout_body: '<span class="group-label">बाह्य तप — शरीर आणि इंद्रिये</span><ol><li><strong>अनशन</strong> — नियमित उपवास</li><li><strong>ऊनोदर</strong> — भुकेपेक्षा कमी खाणे</li><li><strong>वृत्तिपरिसंख्यान</strong> — काय आणि कुठून खायचं याची मर्यादा</li><li><strong>रसपरित्याग</strong> — चविष्ट, समृद्ध पदार्थांचा त्याग</li><li><strong>विविक्त-शय्यासन</strong> — एकांत निवास</li><li><strong>कायक्लेश</strong> — शरीराला होणारा त्रास शांतपणे सहन करणे</li></ol><span class="group-label">अंतरंग तप — मन आणि अहंकार</span><ol><li><strong>प्रायश्चित्त</strong> — चुकांची प्रामाणिक कबुली</li><li><strong>विनय</strong> — नम्रता, गुरुजनांचा आदर</li><li><strong>वैयावृत्त्य</strong> — साधकांची सेवा</li><li><strong>स्वाध्याय</strong> — स्वतःचा अभ्यास, शास्त्रवाचन</li><li><strong>व्युत्सर्ग</strong> — शरीर आणि बाह्य गोष्टींची आसक्ती सोडणे</li><li><strong>ध्यान</strong> — एकाग्र चिंतन (सर्वोच्च तप)</li></ol>',
    s3_q: "ध्यान म्हणजे काय? — आणि चारच प्रकार का?",
    s3_body: s([
      'ध्यान म्हणजे मन एका विषयावर स्थिर ठेवणं — विखुरलेलं नाही, केंद्रित.',
      'मन सतत कोणत्या ना कोणत्या ध्यानात असतंच. प्रश्न एवढाच — कोणत्या प्रकारच्या?',
      'जैन दर्शन चार प्रकार सांगतो. दोन कर्म वाढवतात: <span class="term">आर्त</span> (हरवलेल्या किंवा हव्या असलेल्या गोष्टींची सतत आठवण) आणि <span class="term">रौद्र</span> (राग, हिंसा, स्वामित्व-भावना). दोन कर्म पातळ करतात: <span class="term">धर्म</span> (सत्य, आत्मा, शास्त्रांवरील स्थिर चिंतन) आणि <span class="term">शुक्ल</span> (अत्युच्च टप्प्यांवर येणारी सर्वशुद्ध स्थिती).',
      '<span class="emphasis">दिवसभर बहुतेकजण आर्त आणि रौद्रातच असतात — आणि लक्षातही येत नाही. पहिली खरी साधना म्हणजे हे फक्त पाहणं.</span>',
    ]),
    dhyan_foldout_label: "४ ध्यानांची संपूर्ण यादी",
    dhyan_foldout_body: '<span class="group-label">कर्म बांधणारे</span><ol><li><strong>आर्त</strong> — हरवलेल्या, आजाराच्या, अपूर्ण इच्छेच्या विचारांत अडकणे</li><li><strong>रौद्र</strong> — राग, हिंसा, स्वामित्व-भावनेने भरलेले विचार</li></ol><span class="group-label">कर्म पातळ करणारे</span><ol><li><strong>धर्म</strong> — सत्य, आत्मा, शास्त्र यांचं स्थिर चिंतन</li><li><strong>शुक्ल</strong> — सर्वशुद्ध समाधी; केवळ अत्युच्च गुणस्थानांत येते</li></ol>',
    s4_q: "रोजच्या जीवनात हे कसं उतरवायचं?",
    s4_body: s([
      'मोठ्या, क्वचित केलेल्या तपापेक्षा छोटी पण सातत्यपूर्ण साधना जास्त उपयोगी.',
      'राग येताना तो शांतपणे पाहणं — हे जेवण सोडण्यापेक्षाही जवळचं तप आहे.',
      'रोज दहा मिनिटांचं सामायिक — स्थिर बसून स्वतःचं निरीक्षण — हेच खरं ध्यान.',
      '<span class="emphasis">कसोटी एकच: साधना किती कठीण दिसली नाही, तर आसक्ती खरंच कमी झाली का?</span>',
    ]),
    s5_q: "इथून पुढे काय?",
    s5_body: s([
      'आता दोन्ही गोष्टी हाताशी आहेत — प्रगतीचा नकाशा (गुणस्थान) आणि त्यावर चालण्याची पद्धत (तप-ध्यान).',
      'पण आता एक खोल प्रश्न पुन्हा समोर येतो: ज्या कर्माला आपण कमजोर करायचं आहे, ते आत येतंच नेमकं कशामुळे — आणि एकदा आत आल्यावर ते कसं चिकटतं?',
      'या प्रश्नांची उत्तरं आधीच्या पानांत बाह्य रूपात मिळाली होती. आता पुढची पानं हे अचूक यंत्रणेच्या भाषेत मांडतात.',
      '<span class="emphasis">पुढचा भाग आत वळतो: कर्माची दारं नेमकी कशामुळे उघडतात, बंध कशामुळे ठरतो, आणि ते सोडवण्याची नेमकी प्रक्रिया काय.</span>',
    ]),
    prev_label: "मागे वाचा",
    prev_title: "गुणस्थान",

function setLang(lang) {
  const strings = i18n[lang]; if (!strings) return;
  document.querySelectorAll('[data-i18n]').forEach(el => { const key = el.getAttribute('data-i18n'); if (strings[key] !== undefined) el.textContent = strings[key]; });
  document.querySelectorAll('[data-i18n-html]').forEach(el => { const key = el.getAttribute('data-i18n-html'); if (strings[key] !== undefined) el.innerHTML = strings[key]; });
  document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.toggle('active', btn.getAttribute('data-lang') === lang));
  document.documentElement.lang = lang === 'mr' ? 'mr' : lang === 'hi' ? 'hi' : 'en';
  localStorage.setItem('jainverse-lang', lang);
}

document.querySelectorAll('.lang-btn').forEach(btn => btn.addEventListener('click', () => setLang(btn.getAttribute('data-lang'))));
setLang(localStorage.getItem('jainverse-lang') || 'mr');
window.addEventListener('scroll', () => { document.getElementById('topbar').classList.toggle('scrolled', window.scrollY > 30); }, { passive: true });
const observer = new IntersectionObserver((entries) => { entries.forEach(entry => { if (entry.isIntersecting) { entry.target.classList.add('visible'); observer.unobserve(entry.target); } }); }, { threshold: 0.12, rootMargin: '0px 0px -30px 0px' });
document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
</script>
