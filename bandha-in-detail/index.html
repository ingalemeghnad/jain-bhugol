<style>
  :root { --saffron:#e07830; --saffron-deep:#c45e1a; --indigo:#1a2744; --sand:#f5f0e8; --sand-dark:#e8dfd0; --warm-white:#faf8f4; --stone:#8c7e6a; --stone-light:#b0a48e; --text:#2a2318; --text-secondary:#5c5246; --text-tertiary:#8a7e6e; }

  .topbar { position:fixed; top:0; left:0; right:0; z-index:100; padding:18px 40px; display:flex; align-items:center; justify-content:space-between; transition:background .4s, box-shadow .4s, padding .4s; }
  .topbar.scrolled { background:rgba(250,248,244,.92); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); box-shadow:0 1px 0 rgba(0,0,0,.06); padding:13px 40px; }
  .back-link { display:inline-flex; align-items:center; gap:8px; font-size:14px; font-weight:500; color:var(--text-secondary); text-decoration:none; transition:color .25s; }

  .back-link svg { width:16px; height:16px; transition:transform .25s; }
  .back-link:hover svg { transform:translateX(-3px); }
  .lang-switch { display:flex; align-items:center; border:1px solid var(--sand-dark); border-radius:20px; overflow:hidden; background:rgba(245,240,232,.6); }
  .lang-btn { padding:5px 12px; font-size:12px; font-weight:500; color:var(--text-tertiary); background:none; border:none; cursor:pointer; transition:all .25s; font-family:'Instrument Sans', 'Tiro Devanagari Hindi', sans-serif; white-space:nowrap; }

  .page-header .subtitle { font-family:'DM Serif Display', 'Tiro Devanagari Hindi', serif; font-style:italic; font-size:clamp(16px, 2vw, 20px); color:var(--stone); line-height:1.4; }

  .section-divider { display:flex; align-items:center; justify-content:center; gap:16px; margin:80px 0; color:var(--sand-dark); user-select:none; }
  .section-divider::before, .section-divider::after { content:''; height:1px; width:40px; background:linear-gradient(90deg, transparent, var(--sand-dark)); }
  .section-divider::after { background:linear-gradient(90deg, var(--sand-dark), transparent); }

  .prev-read:hover,.next-read:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(42,35,24,.08); }

  .prev-read-title,.next-read-title { font-family:'DM Serif Display', 'Tiro Devanagari Hindi', serif; font-size:22px; color:var(--indigo); display:flex; align-items:center; gap:10px; }

  .article-footer { margin-top:60px; padding-top:32px; border-top:1px solid var(--sand-dark); display:flex; align-items:center; justify-content:space-between; }
  .article-footer .brand { font-family:'DM Serif Display', serif; font-size:16px; color:var(--stone); text-decoration:none; }
  .article-footer .note { font-size:12px; color:var(--text-tertiary); }
  .reveal { opacity:0; transform:translateY(24px); transition:opacity .7s cubic-bezier(.4,0,.2,1), transform .7s cubic-bezier(.4,0,.2,1); }
  .reveal.visible { opacity:1; transform:translateY(0); }
  @keyframes fadeUp { to { opacity:1; transform:translateY(0); } }
  @media (max-width:600px) {
    .topbar { padding:14px 18px; } .topbar.scrolled { padding:11px 18px; }

    .section { margin-bottom:56px; } .section-num { font-size:56px; margin-bottom:-8px; }
    .section-question { font-size:22px; margin-bottom:20px; }
    .section-body { font-size:16px; line-height:1.9; } .section-divider { margin:56px 0; }
    .foldout { padding:12px 18px; } .foldout-body { font-size:14px; }
    .prev-read,.next-read { padding:22px 24px; }
    .prev-read-title,.next-read-title { font-size:19px; }
    .page-nav { flex-direction:column; }
    .article-footer { flex-direction:column; gap:8px; text-align:center; }
    .lang-btn { padding:4px 9px; font-size:11px; }
  }
</style>

<script>
function s(sentences) { return sentences.map(t => '<span class="sentence">' + t + '</span>').join(''); }

const i18n = {
  mr: {
    page_title: "बंध — सखोल",
    page_subtitle: "कर्म आत्म्याला किती-कसं चिकटतं याची यंत्रणा",
    s1_q: "आत आल्यावर पुढे काय होतं?",
    s1_body: s([
      'आस्रवानं सांगितलं की दार कशामुळे उघडतं — पाच वेगळी कारणं, दृष्टीपासून कृतीपर्यंत.',
      'पण कर्म एकदा आत आल्यावर पुढे काय?',
      'ते फक्त आत येऊन तरंगत राहत नाही. बंधनाच्या त्याच क्षणी चार अगदी ठाम गोष्टी ठरतात.',
      '<span class="emphasis">हे पान त्या चारही उलगडतं — आणि दाखवतं की त्यांपैकी दोन योगानं ठरतात, दोन कषायानं.</span>',
    ]),
    s2_q: "बंधाचे चार आयाम कोणते?",
    s2_body: s([
      'प्रत्येक कर्मबंधनाला चार आयाम असतात, जे बंधाच्या त्याच क्षणी ठरतात:',
      '<span class="term">प्रकृति</span> — कोणत्या प्रकारचं कर्म आहे (ज्ञानावरण, मोहनीय, आयु, वगैरे).',
      '<span class="term">स्थिति</span> — किती काळ टिकेल — फळ देण्याआधी.',
      '<span class="term">अनुभाग</span> (किंवा रस) — फळ देताना त्याची तीव्रता किती.',
      '<span class="term">प्रदेश</span> — एकूण किती कर्म-द्रव्य बांधलं गेलं — सरळ प्रमाण.',
      '<span class="emphasis">ही चार स्वतंत्र असतात. एखादं कर्म प्रकारानं वाईट पण तीव्रतेत सौम्य असू शकतं — किंवा कालावधी कमी पण प्रमाण जास्त.</span>',
    ]),
    dim_foldout_label: "चार आयामांची सविस्तर ओळख",
    dim_foldout_body: '<ol><li><strong>प्रकृति</strong> — प्रकार. आठ मुख्य कुटुंबं (ज्ञानावरण, दर्शनावरण, वेदनीय, मोहनीय, आयु, नाम, गोत्र, अंतराय), आणि त्यांच्यात अनेक उपप्रकार.</li><li><strong>स्थिति</strong> — कालावधी. कर्म फळ देण्याआधी किती काळ सुप्त राहील. बंधाच्या क्षणी कषायाच्या तीव्रतेनुसार ठरतं.</li><li><strong>अनुभाग / रस</strong> — तीव्रता. कर्म फळताना त्याचा परिणाम किती तीक्ष्ण किंवा सौम्य. हाही कषायानं ठरतो.</li><li><strong>प्रदेश</strong> — प्रमाण. एकूण किती कर्म-कण बांधले जातात. योगानं ठरतो.</li></ol>',
    s3_q: "कोण काय ठरवतं? — योग आणि कषायाची स्पष्ट विभागणी",
    s3_body: s([
      'जैन कर्मसिद्धांताची सर्वांत अचूक अंतर्दृष्टी अशी आहे: प्रत्येक कारण प्रत्येक आयाम ठरवत नाही.',
      '<span class="term">योग</span> (हालचाल) ठरवतो <span class="term">प्रकृति</span> (प्रकार) आणि <span class="term">प्रदेश</span> (प्रमाण). क्रियेमुळे कोणतं कर्म आत येतं आणि किती येतं हे ठरतं.',
      '<span class="term">कषाय</span> (राग-मान-माया-लोभ) ठरवतो <span class="term">स्थिति</span> (कालावधी) आणि <span class="term">अनुभाग</span> (तीव्रता). कर्माची धरून ठेवण्याची ताकद आणि चावा — हे कषायामुळेच.',
      'म्हणूनच ज्ञानी पुरुष — ज्याला योग आहे पण कषाय नाही — त्याला कर्म वाहत आलं तरी ते एक क्षणच टिकतं, आणि त्याला कोणतीही तीव्रता नसते.',
      '<span class="emphasis">योग कर्म तयार करतो. कषाय त्याला वजन देतो. कषायाशिवाय बंध चावत नाही.</span>',
    ]),
    s4_q: "काही विशेष — मोहनीय, कषाय-तीव्रता, निकाचित",
    s4_body: s([
      'या चार आयामांत काही विशिष्ट तपशील नावानं ओळखणं उपयोगी आहे.',
      '<span class="term">मोहनीय</span> कर्म सर्वांत मध्यवर्ती आहे — त्याचे दोन भाग: <span class="term">दर्शन-मोहनीय</span> (योग्य दृष्टीला विचलित करणारं) आणि <span class="term">चारित्र-मोहनीय</span> (योग्य आचरणाला विचलित करणारं).',
      'चारित्र-मोहनीयात कषाय चार तीव्रतांत येतात — सर्वांत प्रबल अनंतानुबंधी (जो मिथ्यात्व टिकवतो) पासून सर्वांत सूक्ष्म संज्वलन (जो फक्त सूक्ष्म स्थिरता विचलित करतो) पर्यंत.',
      '<span class="term">निकाचित</span> कर्म असं घट्ट बांधलेलं असतं की तप-सुद्धा त्याला सोडवू शकत नाही; ते भोगूनच संपवावं लागतं.',
      'आणि पुण्य-पापाचे उपप्रकार प्रकृतीत बसतात — अनेक प्रकार, पण मूळ तत्त्व विसरू नये: <span class="emphasis">दोन्हीही बंध आहेत. पुण्य देखील. सोन्याची साखळी, लोखंडाची साखळी.</span>',
    ]),
    kashaya_foldout_label: "कषायाच्या चार पातळ्या",
    kashaya_foldout_body: '<span class="group-label">सर्वांत प्रबल ते सर्वांत सूक्ष्म</span><ol><li><strong>अनंतानुबंधी</strong> — अंतहीन-बांधणारा. मिथ्यात्व टिकवतो. गुणस्थान ४ पर्यंत पोहोचूच देत नाही.</li><li><strong>अप्रत्याख्यान</strong> — त्यागविरोधी. गुणस्थान ५ ची आंशिक व्रतं अडवतो.</li><li><strong>प्रत्याख्यान</strong> — अंशतः-त्यागविरोधी. गुणस्थान ६ ची पूर्ण व्रतं अडवतो.</li><li><strong>संज्वलन</strong> — सूक्ष्म-जळणारा. शेवटचा उरलेला; मुनी-जीवनाला परवानगी देतो पण पूर्ण स्थिरता विचलित करतो. फक्त उच्च गुणस्थानांत संपतो.</li></ol>',
    s5_q: "बंधानंतर पुढे काय?",

function setLang(lang) {
  const strings = i18n[lang]; if (!strings) return;
  document.querySelectorAll('[data-i18n]').forEach(el => { const key = el.getAttribute('data-i18n'); if (strings[key] !== undefined) el.textContent = strings[key]; });
  document.querySelectorAll('[data-i18n-html]').forEach(el => { const key = el.getAttribute('data-i18n-html'); if (strings[key] !== undefined) el.innerHTML = strings[key]; });
  document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.toggle('active', btn.getAttribute('data-lang') === lang));
  document.documentElement.lang = lang === 'mr' ? 'mr' : lang === 'hi' ? 'hi' : 'en';
  localStorage.setItem('jainverse-lang', lang);
}

document.querySelectorAll('.lang-btn').forEach(btn => btn.addEventListener('click', () => setLang(btn.getAttribute('data-lang'))));
setLang(localStorage.getItem('jainverse-lang') || 'mr');
window.addEventListener('scroll', () => { document.getElementById('topbar').classList.toggle('scrolled', window.scrollY > 30); }, { passive: true });
const observer = new IntersectionObserver((entries) => { entries.forEach(entry => { if (entry.isIntersecting) { entry.target.classList.add('visible'); observer.unobserve(entry.target); } }); }, { threshold: 0.12, rootMargin: '0px 0px -30px 0px' });
document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
</script>
