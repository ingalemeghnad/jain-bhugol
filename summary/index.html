<style>

    --saffron: #e07830;
    --saffron-deep: #c45e1a;
    --saffron-light: #f4a560;
    --indigo: #1a2744;
    --indigo-mid: #2a3d66;
    --indigo-light: #3d5a8a;
    --gold: #c9a84c;
    --gold-light: #e4cf8a;
    --sand: #f5f0e8;
    --sand-dark: #e8dfd0;
    --warm-white: #faf8f4;
    --stone: #8c7e6a;
    --stone-light: #b0a48e;
    --text: #2a2318;
    --text-secondary: #5c5246;
    --text-tertiary: #8a7e6e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html {
    scroll-behavior: smooth;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    font-family: 'Instrument Sans', 'Tiro Devanagari Hindi', sans-serif;
    color: var(--text);
    background: var(--warm-white);
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9999;
    opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px 200px;
  }

  /* ---- Top bar (Consistent) ---- */
  .topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 18px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: background 0.4s, box-shadow 0.4s, padding 0.4s;
  }

  .topbar.scrolled {
    background: rgba(250, 248, 244, 0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    box-shadow: 0 1px 0 rgba(0,0,0,0.06);
    padding: 13px 40px;
  }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-secondary);
    text-decoration: none;
    transition: color 0.25s;
  }

  .back-link:hover { color: var(--saffron-deep); }
  .back-link svg { width: 16px; height: 16px; transition: transform 0.25s; }
  .back-link:hover svg { transform: translateX(-3px); }

  .lang-switch {
    display: flex;
    align-items: center;
    border: 1px solid var(--sand-dark);
    border-radius: 20px;
    overflow: hidden;
    background: rgba(245, 240, 232, 0.6);
  }

  .lang-btn {
    padding: 5px 12px;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-tertiary);
    background: none;
    border: none;
    cursor: pointer;
    transition: all 0.25s;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .lang-btn.active { background: var(--indigo); color: var(--sand); }

  /* ---- Article Structure ---- */
  .article {
    max-width: 800px;
    margin: 0 auto;
    padding: 140px 28px 40px;
  }

  .page-header {
    margin-bottom: 60px;
    text-align: center;
  }

  .page-header h1 {
    font-family: 'DM Serif Display', 'Tiro Devanagari Hindi', serif;
    font-size: clamp(32px, 5vw, 48px);
    color: var(--indigo);
    margin-bottom: 12px;
  }

  .page-header .subtitle {
    font-family: 'DM Serif Display', 'Tiro Devanagari Hindi', serif;
    font-style: italic;
    font-size: 18px;
    color: var(--stone);
  }

  /* ---- Tree Diagram ---- */
  .tree-container {
    width: 100%;
    max-width: 650px;
    margin: 0 auto 60px;
    background: var(--warm-white);
    padding: 20px;
    border: 1px solid var(--sand-dark);
    border-radius: 12px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.02);
  }

  .tree-svg {
    width: 100%;
    height: auto;
    display: block;
  }

  .tree-node {
    cursor: pointer;
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .tree-node:hover {
    transform: translateY(-2px);
  }

  .tree-node rect {
    fill: #ffffff;
    stroke-width: 1.5;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    pointer-events: all;
  }

  .tree-node:hover rect {
    fill: #fff;
    stroke: var(--saffron);
    filter: drop-shadow(0 4px 12px rgba(224, 120, 48, 0.15));
  }

  .tree-node.active rect {
    fill: #fff;
    stroke: var(--saffron);
    stroke-width: 2.5;
    filter: drop-shadow(0 2px 8px rgba(224, 120, 48, 0.1));
  }

  .tree-node text {
    font-family: 'Instrument Sans', 'Tiro Devanagari Hindi', sans-serif;
    font-size: 13px;
    font-weight: 600;
    fill: var(--text);
    pointer-events: none;
    user-select: none;
  }

  .tree-line {
    stroke: var(--sand-dark);
    stroke-width: 1.5;
    fill: none;
  }

  .tree-arrow {
    fill: var(--sand-dark);
  }

  /* ---- Sections (Consistent with Article) ---- */
  .info-panel {
    background: var(--sand);
    border: 1px solid var(--sand-dark);
    border-radius: 8px;
    padding: 32px;
    margin-top: 40px;
    transition: opacity 0.4s, transform 0.4s;
    min-height: 160px;
  }

  .info-title {
    font-family: 'DM Serif Display', 'Tiro Devanagari Hindi', serif;
    font-size: 22px;
    color: var(--indigo);
    margin-bottom: 12px;
  }

  .info-body {
    font-size: 16px;
    line-height: 1.8;
    color: var(--text-secondary);
  }

  /* ---- Page Nav (Consistent) ---- */
  .page-nav {
    margin-top: 80px;
    border-top: 1px solid var(--sand-dark);
    padding-top: 40px;
    display: flex;
    justify-content: space-between;
    gap: 20px;
  }

  .prev-read, .next-read {
    flex: 1;
    text-decoration: none;
    color: inherit;
    transition: transform 0.3s;
  }

  .prev-read:hover { transform: translateX(-5px); }
  .next-read:hover { transform: translateX(5px); }

  .nav-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--saffron);
    margin-bottom: 8px;
  }

  .nav-title {
    font-family: 'DM Serif Display', 'Tiro Devanagari Hindi', serif;
    font-size: 20px;
    color: var(--indigo);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .nav-title svg { width: 18px; height: 18px; }

  footer {
    padding: 40px 0;
    text-align: center;
    border-top: 1px solid var(--sand-dark);
    margin-top: 60px;

  .footer-brand { font-family: 'DM Serif Display', serif; font-size: 18px; color: var(--stone); margin-bottom: 8px; }
  .footer-note { font-size: 12px; color: var(--text-tertiary); }

  .reveal {
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .reveal.visible {
    opacity: 1;
    transform: translateY(0);

let currentLang = localStorage.getItem('jainverse-lang') || 'mr';

function setLang(lang) {
  currentLang = lang;
  const strings = i18n[lang];
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (strings[key]) el.textContent = strings[key];
  });
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
  });
  localStorage.setItem('jainverse-lang', lang);
  updateInfo('jiva');
}

function updateInfo(id) {
  const data = i18n[currentLang].details[id];
  document.getElementById('info-title').textContent = data.t;
  document.getElementById('info-body').textContent = data.d;
  document.querySelectorAll('.tree-node').forEach(n => n.classList.toggle('active', n.getAttribute('data-id') === id));
}

document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => setLang(btn.getAttribute('data-lang')));
});

document.querySelectorAll('.tree-node').forEach(node => {
  node.addEventListener('click', () => updateInfo(node.getAttribute('data-id')));
});

// Scroll animations
const observer = new IntersectionObserver((entries) => {
  entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); });
}, { threshold: 0.1 });

document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

window.addEventListener('scroll', () => {
  document.getElementById('topbar').classList.toggle('scrolled', window.scrollY > 30);
}, { passive: true });

setLang(currentLang);
</script>
</body>
</html>
