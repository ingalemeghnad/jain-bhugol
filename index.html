<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jainverse</title>
<meta name="description" content="जैन परंपरेचा परस्परसंवादी अनुभव — भूगोल, तत्त्वज्ञान आणि बरेच काही.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Tiro+Devanagari+Hindi:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --saffron: #e07830;
    --saffron-deep: #c45e1a;
    --saffron-light: #f4a560;
    --indigo: #1a2744;
    --indigo-mid: #2a3d66;
    --indigo-light: #3d5a8a;
    --gold: #c9a84c;
    --gold-light: #e4cf8a;
    --sand: #f5f0e8;
    --sand-dark: #e8dfd0;
    --warm-white: #faf8f4;
    --stone: #8c7e6a;
    --stone-light: #b0a48e;
    --text: #2a2318;
    --text-secondary: #5c5246;
    --text-tertiary: #8a7e6e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html {
    scroll-behavior: smooth;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    font-family: 'Instrument Sans', 'Tiro Devanagari Hindi', sans-serif;
    color: var(--text);
    background: var(--warm-white);
    overflow-x: hidden;
  }

  /* ---- Noise texture overlay ---- */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9999;
    opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px 200px;
  }

  /* ---- Navigation ---- */
  nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    padding: 20px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: background 0.4s, box-shadow 0.4s, padding 0.4s;
  }

  nav.scrolled {
    background: rgba(250, 248, 244, 0.9);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    box-shadow: 0 1px 0 rgba(0,0,0,0.06);
    padding: 14px 40px;
  }

  .nav-brand {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--indigo);
    text-decoration: none;
    letter-spacing: -0.3px;
  }

  .nav-right {
    display: flex;
    align-items: center;
    gap: 28px;
  }

  .nav-links {
    display: flex;
    gap: 28px;
    list-style: none;
  }

  .nav-links a {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-secondary);
    text-decoration: none;
    letter-spacing: 0.3px;
    transition: color 0.25s;
    position: relative;
  }

  .nav-links a::after {
    content: '';
    position: absolute;
    bottom: -4px;
    left: 0;
    width: 0;
    height: 1.5px;
    background: var(--saffron);
    transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .nav-links a:hover { color: var(--text); }
  .nav-links a:hover::after { width: 100%; }

  /* Language switcher */
  .lang-switch {
    display: flex;
    align-items: center;
    gap: 0;
    border: 1px solid var(--sand-dark);
    border-radius: 20px;
    overflow: hidden;
    background: rgba(245, 240, 232, 0.6);
  }

  .lang-btn {
    padding: 5px 12px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-tertiary);
    background: none;
    border: none;
    cursor: pointer;
    transition: all 0.25s;
    letter-spacing: 0.2px;
    font-family: 'Instrument Sans', 'Tiro Devanagari Hindi', sans-serif;
    white-space: nowrap;
  }

  .lang-btn:hover {
    color: var(--text-secondary);
  }

  .lang-btn.active {
    background: var(--indigo);
    color: var(--sand);
    font-weight: 600;
  }

  .lang-divider {
    width: 1px;
    height: 16px;
    background: var(--sand-dark);
  }

  /* ---- Hero ---- */
  .hero {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
    align-items: center;
    padding: 120px 60px 80px;
    position: relative;
    overflow: hidden;
  }

  .hero-content {
    max-width: 560px;
    z-index: 2;
  }

  .hero-eyebrow {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--saffron);
    margin-bottom: 20px;
    opacity: 0;
    transform: translateY(16px);
    animation: fadeUp 0.7s 0.3s forwards;
  }

  .hero h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(48px, 6vw, 80px);
    line-height: 1.02;
    color: var(--indigo);
    letter-spacing: -1.5px;
    margin-bottom: 6px;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 0.8s 0.45s forwards;
  }

  .hero h1 .accent {
    color: var(--saffron);
    font-style: italic;
  }

  .hero-tagline {
    font-family: 'DM Serif Display', 'Tiro Devanagari Hindi', serif;
    font-style: italic;
    font-size: clamp(18px, 2.2vw, 24px);
    color: var(--stone);
    margin-bottom: 32px;
    line-height: 1.5;
    opacity: 0;
    transform: translateY(18px);
    animation: fadeUp 0.8s 0.6s forwards;
  }

  .hero-cta {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 32px;
    background: var(--indigo);
    color: var(--sand);
    font-family: 'Instrument Sans', 'Tiro Devanagari Hindi', sans-serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.3px;
    text-decoration: none;
    border-radius: 4px;
    transition: all 0.3s;
    opacity: 0;
    transform: translateY(18px);
    animation: fadeUp 0.8s 0.75s forwards;
  }

  .hero-cta:hover {
    background: var(--indigo-mid);
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(26, 39, 68, 0.25);
  }

  .hero-cta svg {
    width: 16px;
    height: 16px;
    transition: transform 0.3s;
  }

  .hero-cta:hover svg {
    transform: translateX(3px);
  }

  /* Hero Yantra */
  .hero-yantra {
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .yantra-container {
    width: min(480px, 38vw);
    height: min(480px, 38vw);
    position: relative;
    opacity: 0;
    animation: yantraIn 1.4s 0.5s forwards;
  }

  .yantra-svg {
    width: 100%;
    height: 100%;
  }

  .yantra-ring {
    fill: none;
    stroke-width: 0.8;
    transform-origin: center;
  }

  .ring-1 { stroke: var(--saffron-light); opacity: 0.3; animation: spinSlow 80s linear infinite; }
  .ring-2 { stroke: var(--gold); opacity: 0.25; animation: spinSlow 120s linear infinite reverse; }
  .ring-3 { stroke: var(--indigo-light); opacity: 0.2; animation: spinSlow 100s linear infinite; }
  .ring-4 { stroke: var(--saffron); opacity: 0.15; animation: spinSlow 140s linear infinite reverse; }

  .yantra-petal {
    fill: none;
    stroke-width: 0.5;
    opacity: 0.2;
    transform-origin: center;
  }

  .yantra-center-dot {
    fill: var(--saffron);
    opacity: 0.6;
  }

  /* Decorative background elements */
  .hero-bg-line {
    position: absolute;
    background: linear-gradient(180deg, transparent, var(--sand-dark), transparent);
    width: 1px;
    height: 70%;
    top: 15%;
    opacity: 0.5;
  }

  .hero-bg-line:nth-child(1) { left: 25%; }
  .hero-bg-line:nth-child(2) { left: 50%; opacity: 0.3; }
  .hero-bg-line:nth-child(3) { left: 75%; }

  /* ---- Highlights Section ---- */
  .highlights {
    padding: 100px 60px 120px;
    position: relative;
  }

  .highlights::before {
    content: '';
    position: absolute;
    top: 0;
    left: 60px;
    right: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--sand-dark), var(--stone-light), var(--sand-dark), transparent);
  }

  .section-header {
    display: flex;
    align-items: baseline;
    gap: 20px;
    margin-bottom: 60px;
  }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--saffron);
    flex-shrink: 0;
  }

  .section-line {
    flex: 1;
    height: 1px;
    background: var(--sand-dark);
  }

  .highlights-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 32px;
    max-width: 1200px;
  }

  /* Highlight card — wide, immersive */
  .highlight-card {
    position: relative;
    display: grid;
    grid-template-columns: 1fr 1fr;
    background: var(--warm-white);
    border: 1px solid var(--sand-dark);
    border-radius: 8px;
    overflow: hidden;
    text-decoration: none;
    color: inherit;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .highlight-card:hover {
    border-color: var(--stone-light);
    transform: translateY(-4px);
    box-shadow: 0 24px 56px rgba(42, 35, 24, 0.1), 0 6px 16px rgba(42, 35, 24, 0.05);
  }

  .highlight-visual {
    position: relative;
    min-height: 320px;
    overflow: hidden;
  }

  .highlight-visual-bg {
    position: absolute;
    inset: 0;
    transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .highlight-card:hover .highlight-visual-bg {
    transform: scale(1.05);
  }

  .highlight-visual-jambu {
    background: linear-gradient(135deg, var(--indigo) 0%, #1e3050 40%, #243a5c 100%);
  }

  .highlight-visual-jambu::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 50% 50%, rgba(201, 168, 76, 0.18) 0%, transparent 55%),
      radial-gradient(circle at 50% 50%, transparent 15%, rgba(224, 120, 48, 0.08) 35%, transparent 55%),
      radial-gradient(circle at 50% 50%, transparent 25%, rgba(26, 39, 68, 0.3) 65%);
  }

  .highlight-rings {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .highlight-rings svg {
    width: 240px;
    height: 240px;
    opacity: 0.45;
    animation: spinSlow 160s linear infinite;
  }

  .highlight-body {
    padding: 44px 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .highlight-tag {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--saffron);
    margin-bottom: 14px;
  }

  .highlight-title {
    font-family: 'DM Serif Display', 'Tiro Devanagari Hindi', serif;
    font-size: 36px;
    color: var(--indigo);
    margin-bottom: 6px;
    letter-spacing: -0.5px;
    line-height: 1.1;
  }

  .highlight-title-sub {
    font-family: 'Tiro Devanagari Hindi', serif;
    font-size: 22px;
    color: var(--stone);
    font-weight: normal;
    margin-left: 8px;
  }

  .highlight-desc {
    font-size: 15px;
    line-height: 1.8;
    color: var(--text-secondary);
    margin-top: 14px;
    max-width: 400px;
  }

  .highlight-enter {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-top: 28px;
    padding: 12px 28px;
    background: var(--indigo);
    color: var(--sand);
    font-family: 'Instrument Sans', 'Tiro Devanagari Hindi', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.3px;
    border-radius: 4px;
    transition: all 0.3s;
    align-self: flex-start;
  }

  .highlight-card:hover .highlight-enter {
    background: var(--indigo-mid);
    box-shadow: 0 6px 20px rgba(26, 39, 68, 0.2);
  }

  .highlight-enter svg {
    width: 14px;
    height: 14px;
    transition: transform 0.3s;
  }

  .highlight-card:hover .highlight-enter svg {
    transform: translateX(3px);
  }

  /* ---- Footer ---- */
  footer {
    padding: 40px 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid var(--sand-dark);
  }

  .footer-brand {
    font-family: 'DM Serif Display', serif;
    font-size: 16px;
    color: var(--stone);
  }

  .footer-note {
    font-size: 12px;
    color: var(--text-tertiary);
    letter-spacing: 0.3px;
  }

  /* ---- Animations ---- */
  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes yantraIn {
    from { opacity: 0; transform: scale(0.92) rotate(-8deg); }
    to { opacity: 1; transform: scale(1) rotate(0); }
  }

  @keyframes spinSlow {
    to { transform: rotate(360deg); }
  }

  /* Scroll-triggered fade-in */
  .reveal {
    opacity: 0;
    transform: translateY(28px);
    transition: opacity 0.7s cubic-bezier(0.4, 0, 0.2, 1), transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .reveal.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* ---- Responsive ---- */
  @media (max-width: 900px) {
    .hero {
      grid-template-columns: 1fr;
      padding: 120px 28px 60px;
      min-height: auto;
    }

    .hero-content {
      max-width: 100%;
    }

    .hero-yantra {
      order: -1;
      margin-bottom: 32px;
    }

    .yantra-container {
      width: 240px;
      height: 240px;
    }

    .highlights { padding: 60px 28px 80px; }
    .highlights::before { left: 28px; right: 28px; }
    .highlight-card { grid-template-columns: 1fr; }
    .highlight-visual { min-height: 220px; }
    .highlight-body { padding: 28px 24px 32px; }
    .highlight-title { font-size: 28px; }
    .highlight-title-sub { font-size: 18px; }

    footer { padding: 28px; flex-direction: column; gap: 8px; text-align: center; }

    nav { padding: 16px 20px; }
    nav.scrolled { padding: 12px 20px; }

    .nav-right { gap: 16px; }
    .nav-links { gap: 16px; }
    .nav-links a { font-size: 13px; }

    .lang-btn { padding: 4px 9px; font-size: 11px; }
  }

  @media (max-width: 520px) {
    .hero h1 { font-size: 38px; letter-spacing: -1px; }
    .hero-tagline { font-size: 16px; }
    .section-header { margin-bottom: 36px; }
    .card-body { padding: 20px 22px 24px; }
    .card-visual { height: 180px; }
    .nav-links { display: none; }
  }
</style>
</head>

        <span class="highlight-enter">
          <span data-i18n="card_jambu_enter"></span>
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 8h10M9 4l4 4-4 4"/>
          </svg>
        </span>
      </div>
    </a>
  </div>
</section>

<!-- Footer -->
<footer>
  <span class="footer-brand">Jainverse</span>
  <span class="footer-note" data-i18n="footer_note"></span>
</footer>

<script>
// ---- i18n strings ----
const i18n = {
  mr: {
    nav_explore: "पहा",
    hero_eyebrow: "",
    hero_tagline: "जैन परंपरा, नव्या नजरेने",
    hero_cta: "पुढे जा",
    section_explore: "पहा",
    card_jambu_tag: "Interactive 3D नकाशा",
    card_jambu_title: "जम्बूद्वीप <span class='card-title-sub'>Jambudweep</span>",
    card_jambu_desc: "जैन भूगोलातला सगळ्यात आतला द्वीप — मेरु पर्वत, सात क्षेत्रे, सहा पर्वतरांगा आणि खारा समुद्र, हे सगळं 3D मध्ये पहा.",
    card_jambu_enter: "नकाशा पहा",
    footer_note: "जैन परंपरा · Jain Encyclopaedia",
  },
  hi: {
    nav_explore: "देखें",
    hero_eyebrow: "",
    hero_tagline: "जैन परंपरा, नई नज़र से",
    hero_cta: "आगे बढ़ें",
    section_explore: "देखें",
    card_jambu_tag: "Interactive 3D नक्शा",
    card_jambu_title: "जम्बूद्वीप <span class='card-title-sub'>Jambudweep</span>",
    card_jambu_desc: "जैन भूगोल का सबसे अंदर का द्वीप — मेरु पर्वत, सात क्षेत्र, छह पहाड़ियाँ और खारा समुद्र, सब 3D में देखें.",
    card_jambu_enter: "नक्शा देखें",
    footer_note: "जैन परंपरा · Jain Encyclopaedia",
  },
  en: {
    nav_explore: "Explore",
    hero_eyebrow: "",
    hero_tagline: "Jain tradition, seen anew",
    hero_cta: "Start exploring",
    section_explore: "Explorations",
    card_jambu_tag: "Interactive 3D Map",
    card_jambu_title: "Jambudweep <span class='card-title-sub'>जम्बूद्वीप</span>",
    card_jambu_desc: "The innermost continent of Jain geography — Mount Meru at the centre, seven lands, six mountain ranges, and the salt ocean around it, all in 3D.",
    card_jambu_enter: "Enter the map",
    footer_note: "Jain Tradition · Encyclopaedia",
  }
};

// ---- Language switching ----
function setLang(lang) {
  const strings = i18n[lang];
  if (!strings) return;

  // Update text content
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (strings[key] !== undefined) el.textContent = strings[key];
  });

  // Update innerHTML for elements that need it (card titles with mixed scripts)
  document.querySelectorAll('[data-i18n-html]').forEach(el => {
    const key = el.getAttribute('data-i18n-html');
    if (strings[key] !== undefined) el.innerHTML = strings[key];
  });

  // Update active button
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
  });

  // Update html lang attribute
  document.documentElement.lang = lang === 'mr' ? 'mr' : lang === 'hi' ? 'hi' : 'en';

  // Persist choice
  localStorage.setItem('jainverse-lang', lang);
}

// Language button clicks
document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => setLang(btn.getAttribute('data-lang')));
});

// Initialize with saved preference or default to Marathi
const savedLang = localStorage.getItem('jainverse-lang') || 'mr';
setLang(savedLang);

// ---- Sticky nav on scroll ----
window.addEventListener('scroll', () => {
  document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 40);
}, { passive: true });

// ---- Scroll reveal ----
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('visible');
      observer.unobserve(entry.target);
    }
  });
}, { threshold: 0.15, rootMargin: '0px 0px -40px 0px' });

document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

// ---- Smooth scroll for anchor links ----
document.querySelectorAll('a[href^="#"]').forEach(a => {
  a.addEventListener('click', e => {
    e.preventDefault();
    const target = document.querySelector(a.getAttribute('href'));
    if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });
});
</script>

</body>
</html>
